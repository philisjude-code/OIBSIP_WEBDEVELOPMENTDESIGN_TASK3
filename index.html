<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Temperature Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>Temperature Converter</h1>

  <div class="row">
    <div class="field">
      <label for="degInput">Degrees</label>
      <input type="text" id="degInput" placeholder="e.g. 72">
    </div>
    <div class="field">
      <label for="typeSelect">From</label>
      <select id="typeSelect">
        <option value="F">Fahrenheit</option>
        <option value="C">Celsius</option>
        <option value="K">Kelvin</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="toSelect">To</label>
      <select id="toSelect">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
      </select>
    </div>
  </div>

  <p id="errorMsg"></p>

  <div class="field" style="margin-bottom: 20px;">
    <label>Result</label>
    <p id="result">--</p>
  </div>

  <button onclick="convertTemp()">Convert</button>
</div>
<script src="script.js"> </script>
</body>
</html>
